name: CI

on:
  push:
  pull_request:
  schedule:
    # Semanal, para que el npm audit corra aunque nadie haga push: una vulnerabilidad
    # se publica cuando se publica, no cuando hay commits (referencia 14.3).
    - cron: '30 6 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Referencia 14.3: cadena de suministro npm.
      - run: npm audit --audit-level=high
