name: CI

on:
  push:
  pull_request:
  schedule:
    # Semanal, para que el npm audit corra aunque nadie haga push: una vulnerabilidad
    # se publica cuando se publica, no cuando hay commits (referencia 14.3).
    - cron: '30 6 * * 1'

# El CI solo lee: sin esto, el GITHUB_TOKEN corre con los permisos por defecto del repo.
permissions:
  contents: read

# Empujar dos veces seguidas cancela el run obsoleto en vez de pagarlo entero.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Referencia 14.3: cadena de suministro npm.
      - run: npm audit --audit-level=high

  # El smoke E2E (ADR 0010): backend real con base en memoria + build servido con la
  # CSP estricta + navegador de verdad. Job aparte: que un browser que tarda en
  # instalarse no retrase la señal rapida de lint/test.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      # La traza del fallo (trace: retain-on-failure) se escribe en test-results/: sin
      # subirla, un E2E rojo en CI muere sin artefacto de diagnostico.
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-trazas
          path: test-results/
          retention-days: 7
